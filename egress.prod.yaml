# Egress Worker Configuration - Production
# Environment variables are passed via docker-compose

# LiveKit connection (set via environment)
# api_key: from LIVEKIT_API_KEY env
# api_secret: from LIVEKIT_API_SECRET env
ws_url: ws://livekit:7880

redis:
  address: redis:6379

# CPU limits
cpu_cost:
  room_composite_cpu_cost: 3
  track_composite_cpu_cost: 2
  track_cpu_cost: 1

# S3/R2 storage (credentials from environment)
# s3.access_key: from S3_ACCESS_KEY env
# s3.secret: from S3_SECRET_KEY env

logging:
  level: info
