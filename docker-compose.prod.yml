version: '3.8'

services:
  # ===================
  # Database Services
  # ===================
  postgres:
    image: postgres:15-alpine
    container_name: podchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - podchat-network

  redis:
    image: redis:7-alpine
    container_name: podchat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - podchat-network

  # ===================
  # LiveKit Services
  # ===================
  livekit:
    image: livekit/livekit-server:latest
    container_name: podchat-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip ${VPS_IP:-0.0.0.0}
    ports:
      - "7880:7880"                    # HTTP API (internal)
      - "7881:7881"                    # RTC TCP
      - "50000-50100:50000-50100/udp"  # RTC UDP
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - podchat-network

  livekit-egress:
    image: livekit/egress:latest
    container_name: podchat-egress
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_WS_URL=ws://livekit:7880
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=auto
    volumes:
      - ./egress.prod.yaml:/etc/egress.yaml:ro
      - egress_tmp:/tmp
      - recordings_data:/recordings
    cap_add:
      - SYS_ADMIN
    depends_on:
      - livekit
      - redis
    networks:
      - podchat-network

  # ===================
  # Application Services
  # ===================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podchat-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - LIVEKIT_URL=wss://livekit.livepodchat.com
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - USE_LOCAL_STORAGE=${USE_LOCAL_STORAGE}
      - LOCAL_RECORDINGS_DIR=/recordings
      - FRONTEND_URL=${FRONTEND_URL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - recordings_data:/recordings:ro
    networks:
      - podchat-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_LIVEKIT_URL=${VITE_LIVEKIT_URL}
    container_name: podchat-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - podchat-network

  # ===================
  # Reverse Proxy
  # ===================
  nginx:
    image: nginx:alpine
    container_name: podchat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - livekit
    networks:
      - podchat-network

  # SSL Certificate management
  certbot:
    image: certbot/certbot
    container_name: podchat-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  podchat-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  egress_tmp:
  recordings_data:
