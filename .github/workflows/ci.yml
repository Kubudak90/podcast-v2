name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: podchat
          POSTGRES_PASSWORD: podchat
          POSTGRES_DB: podchat_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://podchat:podchat@localhost:5432/podchat_test
      JWT_SECRET: test-secret-32-chars-minimum-aaaaaaaaaa
      LIVEKIT_URL: ws://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret-32-chars-aaaaaaaaaaaaaaaaa
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b --noEmit
      - run: npm run test:run
      - run: npm run build

  ios:
    name: iOS (build + test)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve packages
        working-directory: PodChat
        run: xcodebuild -resolvePackageDependencies -project PodChat.xcodeproj

      - name: Build & test
        working-directory: PodChat
        run: |
          set -o pipefail
          # Pick whatever iPhone simulator the runner happens to have available.
          DEVICE=$(xcrun simctl list devices available | grep -E "iPhone (1[6-9]|2[0-9])" | head -1 | sed -E 's/.*(iPhone [^(]+) \(.*/\1/' | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project PodChat.xcodeproj \
            -scheme PodChat \
            -destination "platform=iOS Simulator,name=$DEVICE,OS=latest" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit 1
